name: Trigger Webhooks on PR Merge or Push

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [closed]
    branches: [main, dev]

permissions:
  contents: read

jobs:
  notify:
    name: Trigger Webhook
    runs-on: ubuntu-latest

    steps:
      - name: Extract event details
        id: vars
        run: |
          # Determine branch name (compatible for push & PR)
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
          else
            BRANCH="${{ github.event.pull_request.base.ref }}"
          fi

          # Determine if this will trigger (push or merged PR)
          IS_MERGED="false"
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.merged }}" == "true" ]]; then
            IS_MERGED="true"
          fi

          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "is_merged=${IS_MERGED}" >> $GITHUB_OUTPUT

          # Select webhook event type
          if [[ "$BRANCH" == "main" ]]; then
            echo "event_type=production-deploy" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "dev" ]]; then
            echo "event_type=staging-deploy" >> $GITHUB_OUTPUT
          else
            echo "event_type=deploy" >> $GITHUB_OUTPUT
          fi

      - name: Show selected trigger
        run: |
          echo "🌿 Branch:      ${{ steps.vars.outputs.branch }}"
          echo "🔀 PR merged?:  ${{ steps.vars.outputs.is_merged }}"
          echo "🚀 Event type:  ${{ steps.vars.outputs.event_type }}"
          echo "📦 Commit:      ${{ github.sha }}"

      - name: Trigger Webhook
        if: github.event_name == 'push' || steps.vars.outputs.is_merged == 'true'
        env:
          BRANCH: ${{ steps.vars.outputs.branch }}
          EVENT_TYPE: ${{ steps.vars.outputs.event_type }}
          SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          echo "📡 Sending webhook to deploy server…"

          # ------- Determine webhook URL based on branch -------
          if [[ "$BRANCH" == "main" ]]; then
            WEBHOOK_URL="https://api.apps.senat_digit.com/api/v1/webhooks/deploy"
            echo "🚀 Target: PRODUCTION"
          elif [[ "$BRANCH" == "dev" ]]; then
            WEBHOOK_URL="https://dev.api.apps.senat_digit.com/api/v1/webhooks/deploy"
            echo "🚀 Target: DEVELOPMENT"
          else
            echo "❌ Unknown branch: $BRANCH"
            exit 1
          fi

          echo "📍 Webhook URL: $WEBHOOK_URL"

          # ------- Build payload (GitHub webhook format) -------
          PAYLOAD=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg after "${{ github.sha }}" \
            --arg repo "${{ github.repository }}" \
            --arg actor "${{ github.actor }}" \
            --arg msg "${{ github.event.head_commit.message }}" \
            '{
              ref: $ref,
              after: $after,
              repository: {
                full_name: $repo
              },
              pusher: {
                name: $actor
              },
              head_commit: {
                message: $msg,
                id: $after
              }
            }')

          SIGNATURE=$(printf "$PAYLOAD" | openssl dgst -sha256 -hmac "$SECRET" | sed 's/^.* //')

          # ------- Perform webhook call with retry logic -------
          for i in {1..4}; do
            echo "Attempt $i..."
            HTTP_STATUS=$(curl -s -o /tmp/curl_output -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: push" \
              -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
              -d "$PAYLOAD" \
              "$WEBHOOK_URL")

            echo "HTTP Status: $HTTP_STATUS"

            if [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "201" ]]; then
              echo "✅ Webhook sent successfully!"
              cat /tmp/curl_output
              exit 0
            fi

            echo "⚠️ Request failed (status: $HTTP_STATUS). Retrying in 3s..."
            cat /tmp/curl_output
            sleep 3
          done

          echo "❌ Webhook failed after multiple retries."
          cat /tmp/curl_output
          exit 1
