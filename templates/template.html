<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic PDF</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      h1 {
        color: #333;
      }
      p {
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>{{ title }}</h1>
    <p>Case Number: {{ case_number }}</p>
    <p>Entry Date: {{ entry_date }}</p>
    <p>Status: <span style="color: {{ status_color }};">{{ status }}</span></p>
    <ul>
      <li>Total Amount: {{ total_amount }}</li>
      <li>Comments: {{ comment_count }}</li>
      <li>Attachments: {{ attachment_count }}</li>
    </ul>
  </body>
</html>
